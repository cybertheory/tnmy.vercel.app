// Build top nav
document.querySelectorAll('.top-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.top-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('visible'));
    tab.classList.add('active');
    document.getElementById('panel-' + tab.dataset.panel).classList.add('visible');
  });
});

// Build essay tabs
const essayTabsEl = document.getElementById('essay-tabs');
const essayViewsEl = document.getElementById('essay-views');

ESSAYS.forEach((essay, i) => {
  const tab = document.createElement('div');
  tab.className = 'essay-tab' + (i === 0 ? ' active' : '');
  tab.textContent = essay.num === 'EP' ? 'EP' : essay.num;
  tab.title = essay.title;
  if (i === 0) { tab.style.background = essay.dot; tab.style.borderColor = essay.dot; }
  tab.addEventListener('click', () => {
    document.querySelectorAll('.essay-tab').forEach(t => { t.classList.remove('active'); t.style.background = ''; t.style.borderColor = ''; t.style.color = ''; });
    document.querySelectorAll('.essay-view').forEach(v => v.classList.remove('visible'));
    tab.classList.add('active');
    tab.style.background = essay.dot;
    tab.style.borderColor = essay.dot;
    tab.style.color = '#fff';
    document.getElementById('view-' + essay.id).classList.add('visible');
  });
  essayTabsEl.appendChild(tab);

  const view = document.createElement('div');
  view.className = 'essay-view' + (i === 0 ? ' visible' : '');
  view.id = 'view-' + essay.id;

  const lawPills = essay.laws.map(l => `<span class="law-ref" style="color:${essay.dot};border-color:${essay.dot}44;background:${essay.dot}11">${l}</span>`).join('');

  view.innerHTML = `
    <div class="essay-hero" style="background:${essay.dot}09;border-color:${essay.dot}33">
      <div class="essay-num-large" style="color:${essay.dot}">${essay.num} — ${essay.tag}</div>
      <div class="essay-title-large">${essay.title}</div>
      <div class="essay-logline" style="color:${essay.dot}CC">${essay.logline}</div>
      <div class="thesis-bar" style="border-color:${essay.dot}">
        <div class="thesis-bar-label">Core thesis</div>
        <div class="thesis-bar-text">${essay.thesis}</div>
      </div>
      ${essay.laws.length ? `<div style="margin-top:10px"><div class="sub-label">Laws introduced</div><div>${lawPills}</div></div>` : ''}
    </div>
    <div id="sections-${essay.id}"></div>
  `;
  essayViewsEl.appendChild(view);

  const sectionsEl = view.querySelector(`#sections-${essay.id}`);
  essay.sections.forEach(section => {
    const block = document.createElement('div');
    block.className = 'section-block';
    block.innerHTML = `
      <div class="section-header">
        <div class="section-dot" style="background:${essay.dot}"></div>
        <div class="section-title">${section.title}</div>
        <div class="section-chevron">▼</div>
      </div>
      <div class="section-body">
        <div class="sub-label">Content</div>
        <div class="body-text">${section.content}</div>
        ${section.claims.length ? `
          <div class="sub-label">Claims & Proof</div>
          ${section.claims.map(c => `
            <div class="claim-block" style="border-color:${essay.dot}">
              <div class="claim-text">▸ ${c.claim}</div>
              <div class="proof-text">Proof: ${c.proof}</div>
            </div>
          `).join('')}
        ` : ''}
        <div class="sub-label">Key Questions</div>
        ${section.questions.map(q => `<div class="q-row"><div class="q-mark" style="color:${essay.dot}">?</div><div class="q-text">${q}</div></div>`).join('')}
        <div class="sub-label">Studies & Citations</div>
        <div class="chips">${section.studies.map(s => `<span class="chip">${s}</span>`).join('')}</div>
      </div>
    `;
    block.querySelector('.section-header').addEventListener('click', () => block.classList.toggle('open'));
    sectionsEl.appendChild(block);
  });
});

// Build laws panel
const lawsContainer = document.getElementById('laws-container');
LAWS.forEach(cat => {
  const catDiv = document.createElement('div');
  catDiv.className = 'cat-section';
  catDiv.innerHTML = `
    <div class="law-cat-header">
      <div class="law-cat-dot" style="background:${cat.dot}"></div>
      <div class="law-cat-title">${cat.cat}</div>
      <div class="law-cat-count">${cat.laws.length} laws</div>
    </div>
    <div class="laws-grid" id="lawgrid-${cat.cat.replace(/\s/g,'')}"></div>
  `;
  lawsContainer.appendChild(catDiv);

  const grid = catDiv.querySelector(`#lawgrid-${cat.cat.replace(/\s/g,'')}`);
  cat.laws.forEach(law => {
    const novClass = law.novelty === 'novel' ? 'nov-novel' : law.novelty === 'partial' ? 'nov-partial' : 'nov-est';
    const novText = law.novelty === 'novel' ? 'novel' : law.novelty === 'partial' ? 'partial' : 'established';
    const item = document.createElement('div');
    item.className = 'law-item';
    item.innerHTML = `
      <div class="law-item-header">
        <span class="law-code" style="color:${cat.dot}">${law.code}</span>
        <span class="law-stmt">${law.stmt}</span>
        <span class="law-nov ${novClass}">${novText}</span>
        <span class="law-chev">▼</span>
      </div>
      <div class="law-body">
        <div class="law-formal" style="border-color:${cat.dot}">${law.formal}</div>
        <div class="law-section">
          <div class="sub-label">Explanation</div>
          <div class="body-text">${law.exp}</div>
        </div>
        <div class="law-section">
          <div class="sub-label">Implications</div>
          <div class="chips">${law.implies.map(i => `<span class="chip">${i}</span>`).join('')}</div>
        </div>
        <div class="law-section">
          <div class="sub-label">Prior work</div>
          <div class="chips">${law.refs.map(r => `<span class="chip">${r}</span>`).join('')}</div>
        </div>
      </div>
    `;
    item.querySelector('.law-item-header').addEventListener('click', () => item.classList.toggle('open'));
    grid.appendChild(item);
  });
});
</script>
</body>
</html>
